name: NIFTY/SENSEX Bot - Hourly During Market Hours

on:
  schedule:
    # Runs every 30 minutes from 9 AM to 3 PM IST, Mon-Fri
    # = 3:30 AM - 9:30 AM UTC, Monday-Friday
    # IST is UTC+5:30
    - cron: '0,30 3-10 * * 1-5'

  workflow_dispatch: {}  # allows manual "Run workflow" button for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check if within market hours
        id: check_time
        run: |
          CURRENT_UTC=$(date -u +"%H:%M")
          CURRENT_IST=$(TZ='Asia/Kolkata' date +"%H:%M")
          echo "Current IST time: $CURRENT_IST"
          echo "Current UTC time: $CURRENT_UTC"
          
          # Check if time is between 9 AM and 3 PM IST
          # 9 AM IST = 3:30 AM UTC, 3 PM IST = 9:30 AM UTC
          if [[ "$CURRENT_UTC" > "03:30" ]] && [[ "$CURRENT_UTC" < "09:31" ]]; then
            echo "Within market hours"
            echo "run_bot=true" >> $GITHUB_OUTPUT
          else
            echo "Outside market hours"
            echo "run_bot=false" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        if: steps.check_time.outputs.run_bot == 'true'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          GROWW_TOTP_TOKEN: ${{ secrets.GROWW_TOTP_TOKEN }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          GROWW_AUTH_MODE: totp
          MAX_POSITION_SIZE: ${{ secrets.MAX_POSITION_SIZE }}
          MAX_DAILY_LOSS: ${{ secrets.MAX_DAILY_LOSS }}
          STOP_LOSS_PERCENT: ${{ secrets.STOP_LOSS_PERCENT }}
          TAKE_PROFIT_PERCENT: ${{ secrets.TAKE_PROFIT_PERCENT }}
        run: node src/main.js

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/bot.log
          retention-days: 14

      - name: Commit updated database back to repo
        if: always()
        run: |
          git config user.name "nifty-bot[bot]"
          git config user.email "nifty-bot[bot]@users.noreply.github.com"
          git add data/signals.db -f
          if git diff --staged --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "chore: update signals database [skip ci]"
            git push
          fi
