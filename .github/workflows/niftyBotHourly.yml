name: NIFTY/SENSEX Bot - Every 30 Min During Market Hours

on:
  schedule:
    # Fires at :15 and :45 past the hour, 3 AM - 9 AM UTC, Mon-Fri
    # = every 30 min from 9:15 AM to 3:15 PM IST, Monday-Friday (NSE hours)
    # NOTE: GitHub Actions cron can be delayed by a few minutes during high load
    - cron: '15,45 3-9 * * 1-5'
  workflow_dispatch: {}

# Prevents overlapping runs from ever piling up - if a new run starts while
# one is still in progress, the old one is cancelled rather than both running.
concurrency:
  group: nifty-bot-run
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Telegram pre-flight check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Checking Telegram secrets are set (not their values)..."
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is EMPTY or not set in GitHub"
            exit 1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::TELEGRAM_CHAT_ID secret is EMPTY or not set in GitHub"
            exit 1
          fi
          echo "Both secrets are present. Sending a real test ping to confirm they actually work..."
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🔧 GitHub Actions pre-flight check - if you see this, secrets are correctly configured")
          echo "Telegram API response: $RESPONSE"
          OK=$(echo "$RESPONSE" | grep -o '"ok":true' || true)
          if [ -z "$OK" ]; then
            echo "::error::Telegram API did NOT return ok:true - check the response above for the real error (wrong token, bot blocked, wrong chat_id, etc.)"
            exit 1
          fi
          echo "✅ Telegram pre-flight check passed - you should have received a test message just now"

      - name: Run bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          GROWW_TOTP_TOKEN: ${{ secrets.GROWW_TOTP_TOKEN }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          GROWW_AUTH_MODE: totp
          MAX_POSITION_SIZE: ${{ secrets.MAX_POSITION_SIZE }}
          MAX_DAILY_LOSS: ${{ secrets.MAX_DAILY_LOSS }}
          STOP_LOSS_PERCENT: ${{ secrets.STOP_LOSS_PERCENT }}
          TAKE_PROFIT_PERCENT: ${{ secrets.TAKE_PROFIT_PERCENT }}
        run: node src/main.js

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/bot.log
          retention-days: 14

      - name: Commit updated database back to repo
        if: always()
        run: |
          git config user.name "nifty-bot[bot]"
          git config user.email "nifty-bot[bot]@users.noreply.github.com"
          git add data/signals.db -f
          if git diff --staged --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "chore: update signals database [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 3
            done
          fi
