name: NIFTY/SENSEX Bot - Hourly During Market Hours

on:
  schedule:
    # Runs at :45 past the hour, 3 AM - 9 AM UTC, Mon-Fri
    # = 9:15 AM - 3:15 PM IST, Monday-Friday (NSE trading hours)
    # NOTE: GitHub Actions cron can be delayed by a few minutes during high load
    - cron: '45 3-9 * * 1-5'
  workflow_dispatch: {}  # allows manual "Run workflow" button for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          GROWW_TOTP_TOKEN: ${{ secrets.GROWW_TOTP_TOKEN }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          GROWW_AUTH_MODE: totp
          MAX_POSITION_SIZE: ${{ secrets.MAX_POSITION_SIZE }}
          MAX_DAILY_LOSS: ${{ secrets.MAX_DAILY_LOSS }}
          STOP_LOSS_PERCENT: ${{ secrets.STOP_LOSS_PERCENT }}
          TAKE_PROFIT_PERCENT: ${{ secrets.TAKE_PROFIT_PERCENT }}
        run: node src/main.js

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/bot.log
          retention-days: 14